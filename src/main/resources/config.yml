settings:
  # List of players who are EXCLUDED from being targets.
  # These players will not experience twists and will have admin access.
  # Default: ExamplePlayer1 (Replace with your own username if you want to be an admin)
  excluded-players:
    - "ExamplePlayer1"

world-reset:
  # Whether to automatically reset the world.
  enabled: true
  
  # Delay in minutes before resetting the world after everyone leaves or goal is finished.
  # Default: 30 minutes
  reset-delay-minutes: 30

# Internal use only
config-version: 1
